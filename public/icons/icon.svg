<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dark background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Sphere chrome gradient -->
    <radialGradient id="sphere" cx="35%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="14%"  stop-color="#e0e0e0" stop-opacity="1"/>
      <stop offset="35%"  stop-color="#a0a0a0" stop-opacity="1"/>
      <stop offset="65%"  stop-color="#404040" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0d0d0d" stop-opacity="1"/>
    </radialGradient>

    <!-- Outer glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6600cc" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#220066" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner highlight on sphere -->
    <radialGradient id="highlight" cx="38%" cy="28%" r="45%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow -->
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <filter id="blur-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="blur-shadow" x="-30%" y="-10%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="blur-ring" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="100"/>

  <!-- Outer purple glow blob -->
  <ellipse cx="256" cy="240" rx="190" ry="190" fill="url(#glow)" filter="url(#blur-glow)"/>

  <!-- Subtle ring -->
  <circle cx="256" cy="248" r="138" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5" filter="url(#blur-ring)"/>
  <circle cx="256" cy="248" r="110" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

  <!-- Drop shadow beneath sphere -->
  <ellipse cx="256" cy="320" rx="82" ry="20" fill="url(#shadow)" filter="url(#blur-shadow)"/>

  <!-- Sphere body -->
  <circle cx="256" cy="245" r="105" fill="url(#sphere)"/>

  <!-- Specular highlight -->
  <ellipse cx="225" cy="210" rx="40" ry="30" fill="url(#highlight)" opacity="0.9"/>

  <!-- Tiny secondary glint -->
  <ellipse cx="310" cy="290" rx="18" ry="13" fill="rgba(180,210,255,0.18)" style="filter:blur(4px)"/>
</svg>
